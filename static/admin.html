<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PartyPad Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .container {
    display: flex;
    gap: 48px;
    align-items: center;
    width: 100%;
    max-width: 1100px;
  }
  .left-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    background: #16213e;
    border-radius: 20px;
    padding: 36px 40px;
  }
  #qr-container {
    background: #fff;
    display: inline-block;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 20px;
  }
  #qr-image { width: 260px; height: 260px; display: block; }
  .url-box {
    background: #0f3460;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 20px;
    font-weight: bold;
    color: #7af;
    margin-bottom: 20px;
    word-break: break-all;
    text-align: center;
    max-width: 320px;
  }
  .version {
    font-size: 13px;
    color: #555;
  }
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .right-panel .card {
    background: #16213e;
    border-radius: 20px;
    padding: 36px;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 24px;
    color: #7af;
  }
  .status {
    font-size: 17px;
    margin-bottom: 28px;
    color: #aaa;
  }
  .players-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }
  .player-slot {
    background: #0f3460;
    border-radius: 10px;
    padding: 18px 14px;
    text-align: center;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .player-slot.active {
    background: #1b5e20;
    box-shadow: 0 0 16px rgba(0, 200, 0, 0.25);
  }
  .player-slot .slot-num { font-size: 13px; color: #888; margin-bottom: 4px; }
  .player-slot.active .slot-num { color: #81c784; }
  .player-slot .slot-status { font-size: 15px; font-weight: bold; }
  .player-slot.active .slot-status { color: #69f0ae; }
  .btn {
    display: inline-block;
    padding: 14px 36px;
    background: #b71c1c;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    cursor: pointer;
    transition: background 0.2s;
    align-self: flex-start;
  }
  .btn:hover { background: #d32f2f; }
  .btn:active { background: #8e0000; }

  @media (max-width: 800px) {
    .container {
      flex-direction: column;
      gap: 24px;
    }
    .left-panel { padding: 28px; }
    #qr-image { width: 200px; height: 200px; }
    .url-box { font-size: 16px; max-width: 260px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="left-panel">
    <div id="qr-container">
      <img id="qr-image" src="" alt="QR Code" />
    </div>
    <div class="url-box" id="server-url">loading...</div>
    <div class="version">PartyPad v2.0</div>
  </div>

  <div class="right-panel">
    <div class="card">
      <h1>PartyPad Admin</h1>
      <div class="status" id="status-text">No controllers connected</div>
      <div class="players-grid">
        <div class="player-slot" id="slot-1">
          <div class="slot-num">Player 1</div>
          <div class="slot-status">Empty</div>
        </div>
        <div class="player-slot" id="slot-2">
          <div class="slot-num">Player 2</div>
          <div class="slot-status">Empty</div>
        </div>
        <div class="player-slot" id="slot-3">
          <div class="slot-num">Player 3</div>
          <div class="slot-status">Empty</div>
        </div>
        <div class="player-slot" id="slot-4">
          <div class="slot-num">Player 4</div>
          <div class="slot-status">Empty</div>
        </div>
      </div>
      <button class="btn" id="reset-btn" onclick="resetAll()">Reset All Controllers</button>
    </div>
  </div>
</div>

<script>
async function loadInfo() {
  try {
    const resp = await fetch('/api/info');
    const info = await resp.json();
    document.getElementById('server-url').textContent = info.url;
    document.getElementById('qr-image').src = '/qr';

    const count = info.connected_players;
    const statusText = count === 0 ? 'No controllers connected' :
      `${count} controller${count > 1 ? 's' : ''} connected`;
    document.getElementById('status-text').textContent = statusText;

    for (let i = 1; i <= 4; i++) {
      const slot = document.getElementById('slot-' + i);
      if (i <= count) {
        slot.classList.add('active');
        slot.querySelector('.slot-status').textContent = 'Connected';
      } else {
        slot.classList.remove('active');
        slot.querySelector('.slot-status').textContent = 'Empty';
      }
    }
  } catch (e) {
    console.error('Failed to load info:', e);
  }
}

async function resetAll() {
  try {
    await fetch('/api/reset', { method: 'POST' });
    loadInfo();
  } catch (e) {
    console.error('Failed to reset:', e);
  }
}

loadInfo();
setInterval(loadInfo, 2000);
</script>
</body>
</html>
